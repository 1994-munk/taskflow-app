<!DOCTYPE html>
<html lang="en">

<head>

    <!--Character encoding-->
    <meta charset="UTF-8" />

    <!--Mobile Responsiveness-->
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <!--Page Title-->
    <title>TaskFlow</title>

    <!--Connecting CSS-->
    <link rel="stylesheet" href="style.css" />

</head>

<body>

    <!--Main app container-->
    <div class="container">

        <!--App Title-->
        <h1>TaskFlow</h1>

        <p id="taskCount">
            
            Tasks:0
        </p>

    <div class ="filter-buttons">
        <button id="allBtn">
            All
        </button>

        <button id="completedBtn">
            Completed
        </button>

        <button id="pendingBtn">
            Pending
        </button>
        
    </div>

    <!--input section-->
    <div class="input-section">

        <!--Task input-->
        <input
            type="text"
            id="taskInput"
            placeholder="Enter a task"

    />

    <!--Add button-->
    <button id="addButton">
        Add
    </button>


    </div>
    
    <!--Task List-->
    <ul id="taskList"></ul>
</div>

    <!--Connecting JavaScript-->
    <script src="app.js"></script>

</body>

</html>
